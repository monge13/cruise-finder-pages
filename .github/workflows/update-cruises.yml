name: Update cruise finder

on:
  workflow_dispatch:
  schedule:
    - cron: "18 19 1 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update all cruise listings
        run: |
          npm run update
          npm run affiliate

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html cruises.json cruises.csv affiliate_links.csv
          git diff --cached --quiet || git commit -m "Update cruise finder data"
          git push

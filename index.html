  <style>
    :root{--ink:#17202a;--muted:#64707a;--line:#d8dee6;--bg:#f5f3ed;--panel:#fff;--navy:#203f66;--sea:#28706f;--gold:#b77b2a;--rose:#b05b6b}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}
    header{background:#fff;border-bottom:1px solid var(--line);padding:24px clamp(16px,4vw,44px)}h1{margin:0 0 6px;font-size:clamp(25px,3.4vw,42px);letter-spacing:0}.sub{margin:0;color:var(--muted);max-width:980px}
    main{padding:18px clamp(14px,3vw,34px) 36px}.toolbar{display:grid;grid-template-columns:minmax(200px,1.5fr) repeat(6,minmax(116px,.75fr));gap:10px;align-items:end}.toolbar label,.switches label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:800}
    input,select{width:100%;border:1px solid var(--line);border-radius:7px;background:#fff;min-height:40px;padding:9px 10px;font:inherit;color:var(--ink)}.switches{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 16px}.chip{display:inline-flex!important;grid-template-columns:none!important;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;cursor:pointer}.chip input{width:auto;min-height:auto;max-width:100%}
    .summary{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px;margin:0 0 16px}.metric{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}.metric b{display:block;font-size:22px}.metric span{color:var(--muted);font-size:12px}
    .notice{background:#fff8e8;border:1px solid #e4c782;color:#634816;border-radius:8px;padding:10px;margin-bottom:14px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.button,button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:9px 12px;font:inherit;cursor:pointer;text-decoration:none;color:var(--ink);display:inline-flex;align-items:center;justify-content:center}.button.primary,button.primary{background:var(--navy);border-color:var(--navy);color:#fff}.help{color:var(--muted);font-size:12px;margin:0 0 8px}

<body>
  <header><h1>クルーズファインダー</h1><p class="sub">見にくいクルーズ旅行を、出発日・港・泊数・料金・船・販売会社で横断比較するためのMVPです。料金と空席は必ず公式予約ページで最終確認してください。</p></header>
  <main>
    <div class="notice">GitHub Pages公開用の単体版です。料金と空席は予約ページで最終確認してください。</div>
    <section class="toolbar">
      <label>検索<input id="q" placeholder="船名、方面、寄港地、販売会社"></label>
      <label>方面<select id="region"></select></label>
      <label>出発港<select id="port"></select></label>
      <label>販売会社<select id="source"></select></label>
      <label>出発月<select id="month"></select></label>
      <label>泊数<select id="nights"></select></label>
      <label>並び順<select id="sort"><option value="date">出発日順</option><option value="price">安い順</option><option value="perNight">1泊あたり安い順</option><option value="family">子連れ向き順</option></select></label>
    </section>
    <section class="switches">
      <label class="chip"><input id="flight" type="checkbox"> 航空券込み</label>
      <label class="chip"><input id="escorted" type="checkbox"> 添乗員同行</label>
      <label class="chip"><input id="family" type="checkbox"> 子連れ向き</label>
      <label class="chip"><input id="japan" type="checkbox"> 日本発着</label>
      <label class="chip"><input id="balcony" type="checkbox"> バルコニー/海側候補</label>
    </section>
    <details>
      <summary>設定・更新</summary>
      <div class="actions">
        <button id="showStale">更新結果を表示</button>
      </div>
      <p class="help">公開版はこのHTML内のデータを表示します。販売状況は各予約ページで確認してください。</p>
      <div id="updateLog" class="update-log">最終確認日をもとに、各販売会社へのリンク確認結果を表示できます。</div>
    </details>
    <section class="summary">
      <div class="metric"><b id="count">0</b><span>表示中</span></div>
      <div class="metric"><b id="minPrice">-</b><span>最安目安</span></div>
      <div class="metric"><b id="avgNight">-</b><span>平均泊数</span></div>
      <div class="metric"><b id="familyCount">0</b><span>子連れ向き</span></div>
      <div class="metric"><b id="sourceCount">0</b><span>販売会社数</span></div>
    </section>
    <div class="empty" id="empty">条件に合うクルーズがありません。</div>
    <section class="grid" id="cards"></section>
  </main>

    const $ = id => document.getElementById(id);

    function cruiseDateRangeHtml(r){const start=dateParts(r.departureDate);const end=new Date(start.date);end.setDate(end.getDate()+Number(r.nights||0));const finish=dateParts(end.toISOString().slice(0,10));return '<span class="date-range"><span>'+esc(start.full)+' から</span><span>'+esc(finish.full)+'</span></span>'}

    function setup(){optionize($("region"),uniq(DATA.map(r=>r.region)),"すべて");optionize($("port"),uniq(DATA.map(r=>r.departurePort)),"すべて");optionize($("source"),uniq(DATA.map(r=>r.source)),"すべて");optionize($("month"),uniq(DATA.map(r=>String(r.departureDate).slice(0,7))),"すべて");optionize($("nights"),["1-3","4-6","7-10","11+"],"すべて");["q","region","port","source","month","nights","sort","flight","escorted","family","japan","balcony"].forEach(id=>$(id).addEventListener("input",render));$("showStale").addEventListener("click",()=>{$("updateLog").innerHTML=DATA.map(r=>{const ok=r.sourceReachable===false?"要確認":"確認済み";return "・"+esc(r.source)+"｜"+esc(r.title)+"｜"+ok+"｜最終確認 "+esc(r.lastChecked||"-")+"｜<a href='"+esc(r.bookingUrl)+"' target='_blank'>予約ページ</a>"}).join("<br>")});render()}
    function nightMatch(n, bucket){if(!bucket)return true;if(bucket==="1-3")return n<=3;if(bucket==="4-6")return n>=4&&n<=6;if(bucket==="7-10")return n>=7&&n<=10;return n>=11}
    function filtered(){const q=$("q").value.toLowerCase().trim();let rows=DATA.filter(r=>!$("region").value||r.region===$("region").value).filter(r=>!$("port").value||r.departurePort===$("port").value).filter(r=>!$("source").value||r.source===$("source").value).filter(r=>!$("month").value||String(r.departureDate).startsWith($("month").value)).filter(r=>nightMatch(r.nights,$("nights").value)).filter(r=>!$("flight").checked||r.flightIncluded).filter(r=>!$("escorted").checked||r.escorted).filter(r=>!$("family").checked||["S","A"].includes(r.familyScore)).filter(r=>!$("japan").checked||r.region==="日本発着").filter(r=>!$("balcony").checked||/バルコニー|海側/.test(r.cabinType)).filter(r=>!q||[r.title,r.ship,r.cruiseLine,r.region,r.departurePort,r.source,r.notes,(r.tags||[]).join(" "),(r.itinerary||[]).join(" ")].some(v=>String(v).toLowerCase().includes(q)));const s=$("sort").value;rows.sort((a,b)=>s==="price"?a.priceFrom-b.priceFrom:s==="perNight"?(a.priceFrom/a.nights)-(b.priceFrom/b.nights):s==="family"?(scoreRank[b.familyScore]-scoreRank[a.familyScore]):String(a.departureDate).localeCompare(String(b.departureDate)));return rows}
    function render(){const rows=filtered();$("count").textContent=rows.length;$("minPrice").textContent=rows.length?yen(Math.min(...rows.map(r=>r.priceFrom))):"-";$("avgNight").textContent=rows.length?(rows.reduce((s,r)=>s+r.nights,0)/rows.length).toFixed(1):"-";$("familyCount").textContent=rows.filter(r=>["S","A"].includes(r.familyScore)).length;$("sourceCount").textContent=uniq(rows.map(r=>r.source)).length;$("empty").style.display=rows.length?"none":"block";$("cards").innerHTML=rows.map(card).join("")}
    function card(r){return '<article class="card"><div class="card-head"><div class="eyebrow"><span>'+esc(r.source)+'</span><span class="score s-'+esc(r.familyScore)+'">子連れ '+esc(r.familyScore)+'</span></div><div class="title">'+esc(r.title)+'</div><div class="ship">'+esc(r.ship)+'｜'+esc(r.cruiseLine)+'</div></div><div class="card-body"><div class="price">'+yen(r.priceFrom)+'〜</div><div class="facts"><div class="fact"><span>日程</span><b>'+cruiseDateRangeHtml(r)+'</b></div><div class="fact"><span>出発港 / 泊数</span><b>'+esc(r.departurePort)+' / '+esc(r.nights)+'泊</b></div><div class="fact"><span>方面</span><b>'+esc(r.region)+'</b></div><div class="fact"><span>1泊あたり</span><b>'+yen(Math.round(r.priceFrom/r.nights))+'〜</b></div></div><div class="tags">'+r.tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join("")+'</div><div class="notes">'+esc(r.notes)+'</div><div class="notes">寄港地: '+esc(r.itinerary.join(" → "))+'</div></div><div class="card-foot"><a href="'+esc(r.bookingUrl)+'" target="_blank" rel="noreferrer">予約ページへ</a><a class="source" href="'+esc(r.sourceUrl)+'" target="_blank" rel="noreferrer">ソース</a></div></article>'}
